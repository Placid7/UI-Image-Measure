<!DOCTYPE html>
<html>
<head>
  <title>Live Object Detection</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    video {
      width: 400px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }

    .controls {
      text-align: center;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    .results {
      width: 200px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }

    .results h3 {
      margin-top: 0;
    }

    .item {
      margin: 5px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- CAMERA -->
  <div>
    <video id="video" autoplay></video>

    <div class="controls">
      <button onclick="startCamera()">Start</button>
      <button onclick="stopCamera()">Stop</button>
      <button onclick="detect()">Detect</button>
    </div>
  </div>

  <!-- RESULT PANEL -->
  <div class="results" id="result">
    <h3>Objects</h3>
    <p>No data</p>
  </div>

</div>

<script>
const API_URL = "https://measurement-cnn.onrender.com/predict";

const video = document.getElementById("video");
let stream = null;

// START CAMERA
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      video.srcObject = stream;
    })
    .catch(() => alert("Camera denied"));
}

// STOP CAMERA
function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    video.srcObject = null;
  }
}

// DETECT (FAST VERSION - NO IMAGE DISPLAY)
function detect() {

  if (!video.srcObject) {
    alert("Start camera first");
    return;
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  canvas.toBlob(blob => {

    const formData = new FormData();
    formData.append("file", blob, "frame.jpg");

    fetch(API_URL, {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {

      const resultDiv = document.getElementById("result");

      let output = "<h3>Objects</h3>";

      if (data.objects && data.objects.length > 0) {

        data.objects.forEach(obj => {
          output += `
            <div class="item">
              ${obj.class} (${(obj.confidence * 100).toFixed(1)}%)
            </div>
          `;
        });

      } else {
        output += "<p>No objects detected</p>";
      }

      resultDiv.innerHTML = output;

    })
    .catch(() => {
      document.getElementById("result").innerHTML = "Error";
    });

  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>AI Object Detection</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .left {
      text-align: center;
    }

    video, img {
      width: 400px;
      border-radius: 10px;
      border: 2px solid #ddd;
      margin-top: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    .results {
      width: 220px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }

    .item {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="left">

    <h2>📸 Upload Image</h2>
    <input type="file" id="imageInput" />
    <br>
    <button onclick="uploadImage()">Detect Image</button>

    <img id="preview" />

    <hr>

    <h2>🎥 Live Camera</h2>
    <video id="video" autoplay></video>
    <br>
    <button onclick="startCamera()">Start</button>
    <button onclick="stopCamera()">Stop</button>
    <button onclick="detectCamera()">Detect</button>

  </div>

  <!-- RESULT PANEL -->
  <div class="results" id="result">
    <h3>Objects</h3>
    <p>No data</p>
  </div>

</div>

<script>
const API_URL = "https://measurement-cnn.onrender.com/predict";

const video = document.getElementById("video");
let stream = null;

// ------------------ UPLOAD IMAGE ------------------
function uploadImage() {
  const fileInput = document.getElementById("imageInput");
  const file = fileInput.files[0];

  if (!file) {
    alert("Select image first");
    return;
  }

  document.getElementById("preview").src = URL.createObjectURL(file);

  const formData = new FormData();
  formData.append("file", file);

  fetch(API_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(showResults)
  .catch(() => showError());
}

// ------------------ CAMERA ------------------
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      video.srcObject = stream;
    })
    .catch(() => alert("Camera denied"));
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    video.srcObject = null;
  }
}

function detectCamera() {

  if (!video.srcObject) {
    alert("Start camera first");
    return;
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  canvas.toBlob(blob => {

    const formData = new FormData();
    formData.append("file", blob, "frame.jpg");

    fetch(API_URL, {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(showResults)
    .catch(() => showError());

  });
}

// ------------------ RESULT DISPLAY ------------------
function showResults(data) {
  const resultDiv = document.getElementById("result");

  let output = "<h3>Objects</h3>";

  if (data.objects && data.objects.length > 0) {
    data.objects.forEach(obj => {
      output += `
        <div class="item">
          ${obj.class} (${(obj.confidence * 100).toFixed(1)}%)
        </div>
      `;
    });
  } else {
    output += "<p>No objects detected</p>";
  }

  resultDiv.innerHTML = output;
}

function showError() {
  document.getElementById("result").innerHTML = "❌ Error connecting to API";
}
</script>

</body>
</html>

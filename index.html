<!DOCTYPE html>
<html>
<head>
  <title>Object Detection App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }
    .container {
      margin-top: 40px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    canvas {
      margin-top: 20px;
      max-width: 500px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }
    .result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📸 Object Detection App</h1>

  <input type="file" id="imageInput" />
  <br>
  <button onclick="uploadImage()">Predict</button>

  <div class="result" id="result"></div>
</div>

<script>
  const API_URL = "https://measurement-cnn.onrender.com/predict";

  function uploadImage() {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
      alert("Please select an image");
      return;
    }

    document.getElementById("result").innerHTML = "⏳ Processing...";

    const formData = new FormData();
    formData.append("file", file);

    fetch(API_URL, {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      console.log(data);

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();
      img.src = URL.createObjectURL(file);

      img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        let textOutput = "<h3>Results:</h3>";

        if (data.objects && data.objects.length > 0) {

          data.objects.forEach((obj, index) => {
            const [x1, y1, x2, y2] = obj.box;

            // Draw bounding box
            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            // Label
            const label = `Class ${obj.class} (${(obj.confidence * 100).toFixed(1)}%)`;

            ctx.fillStyle = "red";
            ctx.font = "14px Arial";
            ctx.fillText(label, x1, y1 > 10 ? y1 - 5 : 10);

            // Text output
            textOutput += `
              <p>
                Object ${index+1}<br>
                Class: ${obj.class}<br>
                Confidence: ${(obj.confidence * 100).toFixed(1)}%
              </p>
            `;
          });

        } else {
          textOutput += "<p>❌ No objects detected</p>";
        }

        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = textOutput;
        resultDiv.appendChild(canvas);
      };
    })
    .catch(err => {
      console.error(err);
      document.getElementById("result").innerHTML = "❌ Error connecting to API";
    });
  }
</script>

</body>
</html>

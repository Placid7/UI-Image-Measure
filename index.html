<!DOCTYPE html>
<html>
<head>
  <title>Live Object Detection</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }
    .container {
      margin-top: 40px;
    }
    video, canvas {
      margin-top: 20px;
      max-width: 500px;
      border-radius: 10px;
      border: 2px solid #ddd;
    }
    button {
      padding: 10px 20px;
      margin-top: 15px;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎥 Live Object Detection</h1>

  <!-- Webcam -->
  <video id="video" autoplay></video>
  <br>

  <!-- Button -->
  <button onclick="captureAndPredict()">Detect</button>

  <!-- Result -->
  <div class="result" id="result"></div>
</div>

<script>
const API_URL = "https://measurement-cnn.onrender.com/predict";

const video = document.getElementById("video");

// ✅ Start webcam
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("❌ Camera access denied");
  });

// ✅ Capture frame and send to backend
function captureAndPredict() {

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  canvas.toBlob(blob => {

    const formData = new FormData();
    formData.append("file", blob, "frame.jpg");

    fetch(API_URL, {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {

      console.log(data);

      const displayCanvas = document.createElement("canvas");
      const dctx = displayCanvas.getContext("2d");

      displayCanvas.width = canvas.width;
      displayCanvas.height = canvas.height;

      dctx.drawImage(canvas, 0, 0);

      let textOutput = "<h3>Results:</h3>";

      if (data.objects && data.objects.length > 0) {

        data.objects.forEach((obj, index) => {
          const [x1, y1, x2, y2] = obj.box;

          // Draw box
          dctx.strokeStyle = "red";
          dctx.lineWidth = 2;
          dctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

          // Label
          dctx.fillStyle = "red";
          dctx.font = "14px Arial";
          dctx.fillText(
            `${obj.class} (${(obj.confidence * 100).toFixed(1)}%)`,
            x1,
            y1 > 10 ? y1 - 5 : 10
          );

          textOutput += `
            <p>
              ${obj.class} (${(obj.confidence * 100).toFixed(1)}%)
            </p>
          `;
        });

      } else {
        textOutput += "<p>❌ No objects detected</p>";
      }

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = textOutput;
      resultDiv.appendChild(displayCanvas);
    })
    .catch(err => {
      console.error(err);
      document.getElementById("result").innerHTML = "❌ Error connecting to API";
    });

  });
}
</script>

</body>
</html>
